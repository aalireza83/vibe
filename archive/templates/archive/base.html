<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vibe Archive{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Light theme (default) */
        :root {
            --bg:           #f5f5f5;
            --surface:      #ffffff;
            --navbar:       #2b5278;
            --text:         #212529;
            --text-muted:   #6c757d;
            --border:       rgba(0,0,0,.08);
            --shadow:       rgba(0,0,0,.08);
            --badge-bg:     #f8f9fa;
            --badge-color:  #212529;
            --edit-history: #f8f9fa;
            --hover:        #f0f2f4;
        }

        /* Dark theme: official Telegram colors */
        [data-theme="dark"] {
            --bg:           #0e1621;
            --surface:      #182533;
            --navbar:       #17212b;
            --text:         #f5f5f5;
            --text-muted:   #708fa0;
            --border:       rgba(255,255,255,.06);
            --shadow:       rgba(0,0,0,.3);
            --badge-bg:     #232e3c;
            --badge-color:  #aabbc8;
            --edit-history: #1c2c3a;

            /* Override Bootstrap CSS variables */
            --bs-body-color:        #f5f5f5;
            --bs-body-bg:           #0e1621;
            --bs-secondary-color:   #708fa0;
            --bs-border-color:      rgba(255,255,255,.06);
            --bs-card-bg:           #182533;
            --bs-card-border-color: rgba(255,255,255,.06);
            --bs-list-group-bg:     #182533;
            --bs-list-group-border-color: rgba(255,255,255,.06);
            --bs-list-group-color:  #f5f5f5;
            --bs-list-group-action-hover-bg: #1e2f40;
            --hover:        #1e2f40;
            --bs-pagination-bg:     #182533;
            --bs-pagination-border-color: rgba(255,255,255,.06);
            --bs-pagination-color:  #f5f5f5;
            --bs-pagination-disabled-bg: #182533;
            --bs-pagination-disabled-color: #708fa0;
            --bs-form-select-bg:    #182533;
            --bs-input-bg:          #182533;
            --bs-breadcrumb-divider-color: #708fa0;
            --bs-link-color:        #5fa3d0;
            --bs-link-hover-color:  #7dbde8;
        }

        [data-theme="dark"] .text-dark { color: #f5f5f5 !important; }
        [data-theme="dark"] .list-group-item-action:hover,
        [data-theme="dark"] .list-group-item-action:focus { color: #f5f5f5 !important; }
        [data-theme="dark"] .text-muted { color: #708fa0 !important; }
        [data-theme="dark"] .breadcrumb-item a { color: #5fa3d0; }
        [data-theme="dark"] .breadcrumb-item.active { color: #708fa0; }
        [data-theme="dark"] .breadcrumb-item + .breadcrumb-item::before { color: #708fa0; }
        [data-theme="dark"] details summary { color: #708fa0; }
        [data-theme="dark"] .btn-primary { background: #2b5278; border-color: #2b5278; }
        [data-theme="dark"] .btn-primary:hover { background: #3a6b9e; border-color: #3a6b9e; }

        body            { background: var(--bg); color: var(--text); }
        .navbar         { background: var(--navbar) !important; }
        .navbar-brand, .nav-link { color: #fff !important; }

        /* Messages */
        .msg-bubble     { background: var(--surface); box-shadow: 0 1px 2px var(--shadow); }
        .msg-meta       { color: var(--text-muted); }

        /* Bootstrap cards */
        .card           { background: var(--surface); border-color: var(--border); color: var(--text); }
        .list-group-item {
            background: var(--surface);
            border-color: var(--border);
            color: var(--text);
        }
        .list-group-item:hover { background: var(--hover) !important; }


        /* Badges */
        .badge.bg-light { background: var(--badge-bg) !important; color: var(--badge-color) !important; }

        /* Edit history */
        .edit-history   { background: var(--edit-history); }

        /* Search form */
        .form-control, .form-select {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border);
        }
        .form-control:focus, .form-select:focus {
            background: var(--surface);
            color: var(--text);
        }

        /* Pagination */
        .page-link      { background: var(--surface); border-color: var(--border); color: var(--text); }
        .page-item.disabled .page-link { background: var(--surface); color: var(--text-muted); }

        /* Theme toggle button */
        #theme-toggle   { cursor: pointer; font-size: 1.1em; background: none; border: none; color: #fff; padding: 0; }
        #theme-toggle:hover { opacity: .8; }

        /* Message buttons */
        .copy-btn, .bookmark-btn { background: none; border: none; padding: 0 2px; cursor: pointer; font-size: 1em; opacity: 0.4; color: var(--text); transition: opacity .15s, color .15s; }
        .copy-btn:hover, .bookmark-btn:hover, .bookmark-btn.active { opacity: 1; }
        .copy-btn.copied { opacity: 1; color: #28a745; }
    </style>
    {% block extra_css %}{% endblock %}

    <script>
        // Apply the theme before rendering to avoid flicker.
        (function() {
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Vibe Archive</a>
            <div class="d-flex align-items-center gap-3">
                <a href="/search/" class="nav-link">Search</a>
                <a href="/bookmarks/" class="nav-link">Bookmarks</a>
                <a href="/admin/" target="_blank" class="nav-link">Admin</a>
                <button id="theme-toggle" title="Toggle theme">🌙</button>
                <a href="/logout/" class="nav-link">Log out</a>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script>
        function renderMarkdown(root) {
            (root || document).querySelectorAll('.msg-text').forEach(el => {
                if (el.textContent.includes('```')) {
                    el.style.whiteSpace = '';
                    el.innerHTML = marked.parse(el.textContent);
                }
            });
        }
        document.addEventListener('DOMContentLoaded', () => renderMarkdown());

        document.addEventListener('click', e => {
            const btn = e.target.closest('.copy-btn');
            if (!btn) return;
            const text = btn.dataset.text;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                btn.title = 'Copied!';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.title = 'Copy';
                }, 1500);
            });
        });
    </script>
    <script>
        const btn = document.getElementById('theme-toggle');
        const html = document.documentElement;

        function applyTheme(t) {
            html.setAttribute('data-theme', t);
            btn.textContent = t === 'dark' ? '☀️' : '🌙';
        }

        applyTheme(localStorage.getItem('theme') || 'light');

        btn.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
